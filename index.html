<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<button id="menuBtn">☰</button>

<div id="menu">
<button id="historyToggle">History</button>
<button id="scienceToggle">Scientific</button>
<button id="themeToggle">Themes</button>

<div id="themeMenu" class="hidden">
<button data-theme="dark">Dark</button>
<button data-theme="light">Light</button>
<button data-theme="neon">Neon</button>
</div>

<label>
Voice Output
<input type="checkbox" id="voiceOutput">
</label>
</div>

<div class="calculator">

<div id="result">Result:</div>

<input id="display" inputmode="none" placeholder="Enter expression">

<div class="pad" id="pad"></div>

<div id="scientificPanel" class="hidden"></div>

<div class="bottom">
<button id="clear">C</button>
<button id="voice">🎤</button>
<button id="equals">=</button>
</div>

<div id="historyBox">
<button id="clearHistory">Clear History</button>
<ul id="historyList"></ul>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
