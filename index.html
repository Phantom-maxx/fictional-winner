<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="app">

<!-- ===== HEADER ===== -->
<div class="header">
<button id="menuBtn">☰</button>
</div>

<!-- ===== MENU ===== -->
<div id="menu" class="hidden">

<button id="toggleHistory">History</button>

<label class="voice-toggle">
<input type="checkbox" id="voiceToggle"> Voice Output
</label>

<button id="themeBtn">Themes</button>

<div id="themes" class="hidden">
<button data-theme="dark">Dark</button>
<button data-theme="light">Light</button>
<button data-theme="neon">Neon</button>
</div>

<button id="moreBtn">More Functions</button>

<div id="morePanel" class="hidden">
<button data-val="^">^</button>
<button data-val="%">%</button>
<button data-val="π">π</button>
<button data-val="√">√</button>
</div>

</div>

<!-- ===== DISPLAY ===== -->
<div class="display">
<div id="result">0</div>
<input id="input" readonly>
</div>

<!-- ===== KEYPAD ===== -->
<div id="keypad"></div>

<!-- ===== CONTROLS ===== -->
<div class="controls">
<button id="clear">C</button>
<button id="back">⌫</button>
<button id="equals">=</button>
<button id="voice">🎤</button>
</div>

<!-- ===== HISTORY ===== -->
<div id="history" class="hidden">
<button id="clearHistory">Clear</button>
<div id="historyList"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
