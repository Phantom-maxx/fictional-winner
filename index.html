<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="light">

<!-- MENU BUTTON -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden" onclick="toggleMenu()"></div>

<!-- POPUP MENU -->
<div id="menu" class="menu-popup hidden">

<h3>Menu</h3>

<button class="menu-item" onclick="toggleThemes()">🎨 Themes</button>
<button class="menu-item" onclick="toggleHistory();toggleMenu()">📜 History</button>

<div id="themes" class="submenu hidden">
<button onclick="setTheme('light')">☀ Light</button>
<button onclick="setTheme('dark')">🌙 Dark</button>
<button onclick="setTheme('neon')">⚡ Neon</button>
<button onclick="setTheme('ocean')">🌊 Ocean</button>
</div>

</div>


<div class="calculator">

<div id="result" class="result">Result:</div>

<input id="input" type="text" placeholder="Enter calculation">

<div class="buttons">

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="appendOperator('/')">/</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="appendOperator('*')">*</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="appendOperator('-')">-</button>

<button onclick="append('0')">0</button>
<button onclick="appendDecimal()">.</button>
<button onclick="calculate()">=</button>
<button onclick="appendOperator('+')">+</button>

<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button onclick="append('%')">%</button>
<button onclick="append('Math.sqrt(')">√</button>

<button onclick="append('^')">Power</button>
<button onclick="append('Math.PI')">π</button>
<button onclick="append('Math.E')">e</button>
<button onclick="backspace()">⌫</button>

</div>

<div class="controls">
<button onclick="clearInput()">Clear</button>
<button onclick="startVoiceInput()">🎤 Speak</button>
</div>

</div>

<!-- HISTORY PANEL -->
<div id="historyPanel" class="history hidden">

<div class="history-header">
History
<button onclick="clearHistory()">🗑</button>
</div>

<ul id="historyList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
