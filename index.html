<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<button id="menuBtn">☰</button>

<div id="menu">

<button id="historyToggle">History</button>
<button id="scienceToggle">Scientific</button>
<button id="themeToggle">Themes</button>

<div id="themeMenu" class="hidden">
<button data-theme="dark">Dark</button>
<button data-theme="light">Light</button>
<button data-theme="neon">Neon</button>
</div>

<label class="voiceLabel">
Voice Output
<input type="checkbox" id="voiceOutput">
</label>

</div>


<div class="calculator">

<div id="result">Result:</div>

<input id="display" placeholder="Enter your calculation">

<div id="basicPad" class="pad">

<button>7</button>
<button>8</button>
<button>9</button>
<button>⌫</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>/</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button>*</button>

<button>0</button>
<button>.</button>
<button>=</button>
<button>-</button>

<button>(</button>
<button>)</button>
<button>%</button>
<button>+</button>

<button>^</button>
<button>π</button>
<button>e</button>
<button>√</button>

</div>


<div class="bottomBar">
<button id="clearBtn">Clear</button>
<button id="voiceBtn">🎤 Speak</button>
</div>


<div id="historyPanel">

<button id="clearHistory">Clear History</button>

<ul id="historyList"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
