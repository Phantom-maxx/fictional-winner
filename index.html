<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- DISPLAY -->
<div class="display-box">
<div id="result">0</div>
<input id="display" readonly placeholder="0">
</div>

<!-- FUNCTION ROW -->
<div class="top-row">
<button class="func" onclick="Input.insert('√')">√</button>
<button class="func" onclick="Input.insert('%')">%</button>
<button class="func" onclick="Input.insert('(')">(</button>
<button class="func" onclick="Input.insert(')')">)</button>
<button id="voice" class="func">🎤</button>
</div>

<!-- KEYPAD -->
<div class="keypad">

<button class="num">7</button>
<button class="num">8</button>
<button class="num">9</button>
<button class="op">/</button>

<button class="num">4</button>
<button class="num">5</button>
<button class="num">6</button>
<button class="op">*</button>

<button class="num">1</button>
<button class="num">2</button>
<button class="num">3</button>
<button class="op">-</button>

<button class="num">.</button>
<button class="num">0</button>
<button id="equals" class="op">=</button>
<button class="op">+</button>

</div>

<!-- CONTROLS -->
<div class="controls">
<button id="clear">C</button>
<button id="backspace">⌫</button>

<label class="voice-toggle">
<input type="checkbox" id="voiceToggle">
<span>Voice</span>
</label>

<button id="toggleSci">Sci</button>
</div>

<!-- SCIENTIFIC -->
<div id="scientific" class="hidden"></div>

<!-- HISTORY -->
<div id="historyBox" class="hidden"></div>

</div>

<script src="script.js"></script>
</body>
</html>
