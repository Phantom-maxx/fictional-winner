<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<button id="menuBtn">☰</button>

<div id="menu">
<button id="toggleSci">Scientific</button>
<button id="toggleHistory">History</button>
<button id="toggleTheme">Themes</button>

<div id="themeOptions" class="hidden">
<button data-theme="dark">Dark</button>
<button data-theme="light">Light</button>
<button data-theme="neon">Neon</button>
</div>
</div>

<div class="calculator">

<div id="result">Result: </div>
<input id="display" placeholder="0" readonly>

<div id="keypad"></div>
<div id="scientific" class="hidden"></div>

<div class="bottom">
<button id="clear">C</button>
<button id="voice">🎤</button>
<button id="equals">=</button>
</div>

<div id="history" class="hidden"></div>

</div>

<script src="script.js"></script>
</body>
</html>
