<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Advanced Calculator</title>

<link rel="stylesheet" href="style.css">
</head>


<body class="dark">

<div class="calculator">

<div id="menuBtn">☰</div>

<div id="menu">

<button id="historyToggle">History</button>
<button id="scienceToggle">Scientific</button>
<button id="themeToggle">Themes</button>

<div id="themeMenu">
<button data-theme="dark">Dark</button>
<button data-theme="light">Light</button>
<button data-theme="neon">Neon</button>
</div>

<label class="voiceSwitch">
Voice Output
<input type="checkbox" id="voiceOutput">
</label>

</div>


<input id="display" type="text" placeholder="0">

<div id="result">Result:</div>


<div id="basicPad" class="pad">

<button>C</button>
<button>(</button>
<button>)</button>
<button>/</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button>*</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button>-</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button>+</button>

<button>0</button>
<button>.</button>
<button>=</button>
<button id="voiceBtn">🎤</button>

</div>


<div id="sciPad" class="pad hidden">

<button data-func="sin(">sin</button>
<button data-func="cos(">cos</button>
<button data-func="tan(">tan</button>
<button data-op="^">^</button>

<button data-func="sqrt(">√</button>
<button data-func="log(">log</button>
<button data-func="ln(">ln</button>
<button>(</button>

<button>)</button>
<button data-func="pi">π</button>
<button data-func="e">e</button>
<button>=</button>

</div>


<div id="historyPanel">
<ul id="historyList"></ul>
</div>

</div>


<script src="script.js"></script>

</body>
</html>
